# System Permissions Configuration
# 格式:
# [[permissions]]
# name = "权限名称"
# expression = "权限表达式"
# groupName = "分组"

# -----------------
# 菜单管理
# -----------------
[[permissions]]
name = "获取菜单"
expression = "sys:menu:list"
groupName = "system"

[[permissions]]
name = "创建菜单"
expression = "sys:menu:create"
groupName = "system"

[[permissions]]
name = "修改菜单"
expression = "sys:menu:update"
groupName = "system"

[[permissions]]
name = "删除菜单"
expression = "sys:menu:delete"
groupName = "system"

